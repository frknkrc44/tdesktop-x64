name: Build Telegram Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Telegram Desktop
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: tdesktop:centos_env
      BUILD_TYPE: Release  # Cambiamos de Debug a Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: nubesurrealista/tdesktop-x64
          submodules: recursive

      - name: Set up build environment
        run: |
          sudo apt update
          curl -sSL https://install.python-poetry.org | python3 -
          cd Telegram/build/docker/centos_env
          poetry install
          DOCKERFILE=$(DEBUG= LTO= poetry run gen_dockerfile)
          echo "$DOCKERFILE" > Dockerfile

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1
        with:
          tool-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/.buildx-cache
          key: ${{ runner.OS }}-docker-${{ hashFiles('Telegram/build/docker/centos_env/**') }}
          restore-keys: ${{ runner.OS }}-docker-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: Telegram/build/docker/centos_env
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=local,src=${{ runner.temp }}/.buildx-cache
          cache-to: type=local,dest=${{ runner.temp }}/.buildx-cache-new,mode=max

      - name: Update cache
        run: |
          rm -rf ${{ runner.temp }}/.buildx-cache
          mv ${{ runner.temp }}/.buildx-cache{-new,}

      - name: Build Telegram Desktop
        run: |
          docker run --rm \
          -u $(id -u) \
          -v $PWD:/usr/src/tdesktop \
          -e CONFIG=${{ env.BUILD_TYPE }} \
          $IMAGE_TAG \
          /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
          -D CMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -D TDESKTOP_API_ID=${{ secrets.TELEGRAM_API_ID }} \
          -D TDESKTOP_API_HASH=${{ secrets.TELEGRAM_API_HASH }} \
          -D TDESKTOP_API_TEST=ON \
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF \
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=OFF

      - name: Verify build
        run: |
          filePath="out/${{ env.BUILD_TYPE }}/Telegram"
          if test -f "$filePath"; then
            echo "Build successful!"
            
            # Mostrar información del binario
            ls -lh "$filePath"
            file "$filePath"
          else
            echo "Build failed - output file not found"
            exit 1
          fi

      - name: Package artifact
        run: |
          mkdir -p artifact
          cp out/${{ env.BUILD_TYPE }}/{Telegram,Updater} artifact/
          tar czf telegram-desktop.tar.gz -C artifact .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-Desktop
          path: telegram-desktop.tar.gz
